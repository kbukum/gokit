version: "2"

linters:
  default: standard
  enable:
    # --- Existing ---
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - gocritic
    - gosec
    - bodyclose
    - noctx
    - govet
    - errcheck
    - staticcheck
    - exhaustive
    - unused
    - ineffassign
    # --- Error handling discipline ---
    - errorlint
    - nilerr
    # --- Bug-prone patterns ---
    - copyloopvar
    - wastedassign
    # --- SQL safety ---
    - sqlclosecheck
    - rowserrcheck
    # --- Architecture / layering ---
    - depguard
    # --- Test discipline (F-053, partial) ---
    # Conservative permissive defaults — these catch new code that is clearly
    # wrong without forcing a sweep over legacy tests. The remaining linters
    # from the original finding (paralleltest, revive) require large-scale
    # fixups and are tracked separately. contextcheck enabled per #99.
    - tparallel
    - testifylint
    - nilnil
    - nestif
    - contextcheck
  exclusions:
    rules:
      # Test files have a narrower exclusion list than before (F-022 #52).
      # `errcheck`, `gosec`, `noctx`, `unparam` and `unused` remain disabled
      # in tests as a pragmatic concession (test setup intentionally ignores
      # close errors, uses weak rand, etc.). `gocritic` and `errorlint` were
      # removed from the blanket — they catch real bugs in test code too.
      # `contextcheck` is exempted for tests: each table row legitimately
      # creates its own context.Background() / context.WithTimeout root.
      - path: "_test\\.go"
        linters:
          - errcheck
          - gosec
          - noctx
          - unparam
          - unused
          - contextcheck
      # bootstrap/summary.go intentionally calls fmt.Fprintf on a configurable
      # writer; errors are surfaced through the writer's contract, not
      # propagated. Was: whole-file errcheck exclusion (F-079 #81); now
      # scoped to the specific call pattern.
      - path: "bootstrap/summary\\.go"
        linters:
          - errcheck
        source: "fmt\\.Fprint"
  settings:
    govet:
      enable:
        - shadow
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - paramTypeCombine
    nakedret:
      max-func-lines: 30
    misspell:
      locale: US
    nestif:
      # Default min-complexity is 5; bump to 8 to focus on truly hairy nested
      # branches and avoid churn on legitimate domain logic (tree rendering,
      # build-info parsing, cascade error fan-out). Sites above 8 should be
      # extracted into helpers.
      min-complexity: 8
    gosec:
      excludes:
        # Codes valid for the pinned golangci-lint (v2.9.0) gosec.
        # Mirrored by gosec.toml for the `// #nosec`-honouring annotations
        # path. Standalone gosec CI job removed (F-005 #35) — golangci-lint's
        # gosec is the single source of truth.
        - G115  # Integer overflow conversion — too noisy across the codebase.
        - G404  # math/rand acceptable for non-security paths (jitter, IDs).
        - G306  # File permissions — flagged at specific call sites where 0644 is intentional.
        - G304  # File paths from variables — required for storage abstraction.
        # G402 (TLS InsecureSkipVerify) is intentionally NOT excluded.
        # Per-site //nolint:gosec comments document the opt-in semantics at
        # security/tls.go and discovery/consul/consul.go.
    exhaustive:
      default-signifies-exhaustive: true
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    depguard:
      # Enforce architectural layering: foundation packages must not import
      # transport packages. Closes F-014; prevents F-012 (worker → sse) from
      # recurring.
      #
      # Tiers:
      #   foundation : transport-agnostic primitives & utilities
      #   transport  : protocol-specific adapters (HTTP, SSE, gRPC, etc.)
      #   integration: composes foundation + transport
      #   (integration packages may import either; not enforced here)
      rules:
        foundation:
          list-mode: lax
          files:
            - "$gokit/worker/**/*.go"
            - "$gokit/errors/**/*.go"
            - "$gokit/logger/**/*.go"
            - "$gokit/validation/**/*.go"
            - "$gokit/hook/**/*.go"
            - "$gokit/util/**/*.go"
            - "$gokit/version/**/*.go"
            - "$gokit/encryption/**/*.go"
            - "$gokit/schema/**/*.go"
            - "$gokit/ai/**/*.go"
            - "$gokit/resilience/**/*.go"
            - "$gokit/httpclient/**/*.go"
            - "$gokit/observability/**/*.go"
          deny:
            - pkg: github.com/kbukum/gokit/llm
              desc: "foundation packages must not import L7 AI modules for shared vocabulary; consume ai instead."
            - pkg: github.com/kbukum/gokit/tool
              desc: "foundation packages must not import L7 AI modules for shared vocabulary; consume ai instead."
            - pkg: github.com/kbukum/gokit/agent
              desc: "foundation packages must not import L7 AI modules for shared vocabulary; consume ai instead."
            - pkg: github.com/kbukum/gokit/inference
              desc: "foundation packages must not import L7 AI modules for shared vocabulary; consume ai instead."
            - pkg: github.com/kbukum/gokit/sse
              desc: "foundation packages must not import transport (sse). Define a local interface and accept any concrete that satisfies it. See F-012."
            - pkg: github.com/kbukum/gokit/server
              desc: "foundation packages must not import transport (server)."
            - pkg: github.com/kbukum/gokit/grpc
              desc: "foundation packages must not import transport (grpc)."
            - pkg: github.com/kbukum/gokit/connect
              desc: "foundation packages must not import transport (connect)."
            - pkg: github.com/kbukum/gokit/bootstrap
              desc: "foundation packages must not import integration (bootstrap)."
        observability-no-ai:
          list-mode: lax
          files:
            - "$gokit/observability/**/*.go"
          deny:
            - pkg: github.com/kbukum/gokit/ai
              desc: "observability must have zero AI/ML knowledge; ai/semconv owns GenAI semantic conventions."
            - pkg: github.com/kbukum/gokit/llm
              desc: "observability must not import L7 AI modules."
            - pkg: github.com/kbukum/gokit/tool
              desc: "observability must not import L7 AI modules."
            - pkg: github.com/kbukum/gokit/agent
              desc: "observability must not import L7 AI modules."
            - pkg: github.com/kbukum/gokit/inference
              desc: "observability must not import L7 AI modules."

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
    - gofumpt   # F-080 #81: stricter formatter, superset of gofmt.
  settings:
    goimports:
      local-prefixes:
        - github.com/kbukum/gokit
