version: "2"

linters:
  default: standard
  enable:
    # --- Existing ---
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - gocritic
    - gosec
    - bodyclose
    - noctx
    - govet
    - errcheck
    - staticcheck
    - exhaustive
    - unused
    - ineffassign
    # --- New: error handling discipline ---
    - errorlint
    - nilerr
    # --- New: bug-prone patterns ---
    - copyloopvar
    - wastedassign
    # --- New: SQL safety ---
    - sqlclosecheck
    - rowserrcheck
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
          - gosec
          - noctx
          - unparam
          - unused
          - gocritic
          - errorlint
      # Bootstrap summary intentionally writes to a configurable writer.
      - path: "bootstrap/summary\\.go"
        linters:
          - errcheck
  settings:
    govet:
      enable:
        - shadow
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - paramTypeCombine  # Prefer explicit types for each parameter for clarity
    nakedret:
      max-func-lines: 30
    misspell:
      locale: US
    gosec:
      excludes:
        - G115  # Integer overflow conversion — too noisy across the codebase.
        - G404  # math/rand is acceptable for non-security paths (jitter, IDs).
        - G306  # File permissions — flagged at specific call sites where 0644 is intentional.
        - G304  # File paths from variables — required for storage abstraction.
        - G117  # Exported struct fields matching secret patterns — config structs need these fields.
        # G402 (TLS InsecureSkipVerify) is intentionally NOT excluded here.
        # Per-site //nolint:gosec comments document the opt-in semantics at
        # security/tls.go and discovery/consul/consul.go.
        - G704  # SSRF via taint analysis — HTTP clients use configured base URLs.
    exhaustive:
      default-signifies-exhaustive: true
    errorlint:
      errorf: true
      asserts: true
      comparison: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kbukum/gokit
