name: Release

# Release workflow: tag push → goreleaser → SBOM + cosign + GitHub Release.
# Closes F-037 (no release/SBOM/cosign workflow), F-055 (no goreleaser),
# F-056 (gh release list empty despite tags).
#
# Trigger: push of any root v* tag. Per-submodule tags
# (e.g. messaging/kafka/v0.2.0-alpha.1) are handled separately by tag-modules.sh and do
# not trigger a release here.

on:
  push:
    tags:
    - "v*"

permissions:
  contents: write   # publish release assets
  id-token: write   # cosign keyless signing via OIDC
  attestations: write   # SLSA build provenance attestation

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cyclonedx-gomod (SBOM generator)
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.7.0

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6e057b6926d9aa9e7a5a76a40450a05beb073 # v3.7.0
        with:
          cosign-release: "v2.4.1"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "v2.11.2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify cosign signature (keyless)
        run: |
          set -euo pipefail
          cosign verify-blob \
            --certificate dist/checksums.txt.pem \
            --signature dist/checksums.txt.sig \
            --certificate-identity-regexp '^https://github.com/kbukum/gokit/\.github/workflows/release\.yml@.*' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            dist/checksums.txt
          echo "cosign verify-blob succeeded ✓"

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*-source.tar.gz
            dist/checksums.txt
            dist/*.cdx.json
