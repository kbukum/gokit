name: Commit Lint

# Enforces Conventional Commits on the PR title, which becomes the squash-merge
# commit subject. Self-contained (no third-party action) to keep the supply
# chain minimal; the PR title is passed through env, never interpolated into the
# shell, so a crafted title cannot inject commands.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  conventional-commit:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          # type(scope)?!?: subject — types per the Conventional Commits spec.
          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9,._/-]+\))?(!)?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title is not a Conventional Commit: \"$PR_TITLE\""
            echo "Expected: <type>(<optional scope>): <subject>"
            echo "Types: build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test"
            echo "Example: feat(cache): add TTL eviction"
            exit 1
          fi
          echo "PR title is a valid Conventional Commit ✓"
