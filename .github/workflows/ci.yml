name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# All third-party actions are pinned by 40-char SHA. Dependabot is configured
# (see .github/dependabot.yml) to bump both the SHA and the trailing version
# comment in lock-step. Do not relax to floating tags.

jobs:
  # ── Stage 1: Discover affected modules ────────────────────────────────────
  # On `pull_request`, only modules that contain a changed file (plus their
  # in-repo reverse-dependency closure) flow into the per-module matrices.
  # On `push` to main, or when CI/build-config files change, the script
  # falls back to the full module list. See scripts/affected_modules.py
  # for the full trigger list.
  discover:
    name: Discover Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.compute.outputs.modules }}
      check_includes: ${{ steps.compute.outputs.check_includes }}
      is_full: ${{ steps.compute.outputs.is_full }}
      reason: ${{ steps.compute.outputs.reason }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0
        with:
          # Full history so we can diff against any merge-base.
          fetch-depth: 0

      - name: Resolve base SHA
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_BASE_SHA" ]; then
            echo "sha=$PR_BASE_SHA" >> "$GITHUB_OUTPUT"
            echo "Using PR base SHA: $PR_BASE_SHA"
          elif [ -n "$PR_BASE_REF" ]; then
            git fetch --no-tags --depth=1 origin "$PR_BASE_REF" || true
            sha=$(git rev-parse "origin/$PR_BASE_REF" 2>/dev/null || echo "")
            echo "sha=$sha" >> "$GITHUB_OUTPUT"
            echo "Using base ref $PR_BASE_REF -> $sha"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "No base ref (push or unknown event); script will full-rebuild."
          fi

      - name: Compute affected modules
        id: compute
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ steps.base.outputs.sha }}
        run: python3 scripts/affected_modules.py

  # ── Stage 2: Go version consistency across all modules ─────────────────────
  version-check:
    name: Go Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Verify uniform Go version across modules
        run: |
          versions=$(grep '^go ' $(find . -name go.mod -not -path '*/vendor/*' -not -path '*/.git/*') | awk '{print $NF}' | sort -u)
          count=$(printf '%s\n' "$versions" | grep -c .)
          if [ "$count" -ne 1 ]; then
            echo "::error::Multiple Go versions found across modules:"
            printf '%s\n' "$versions"
            exit 1
          fi
          echo "All modules use Go version: $versions"

  # ── Stage 3a: Tidy + CHANGELOG check ──────────────────────────────────────
  tidy:
    name: Tidy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Validate CHANGELOG unreleased heading
        run: ./scripts/check_changelog_unreleased.sh

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      - name: Verify modules are tidy
        run: |
          ./gomod.sh tidy
          if [ -n "$(git status --porcelain -- '*.mod' '*.sum')" ]; then
            echo "::error::go.mod/go.sum are not tidy. Run 'make tidy' and commit the changes."
            git --no-pager diff -- '*.mod' '*.sum'
            exit 1
          fi

  # ── Stage 3b: Build + Vet + Test (per affected module × OS, parallel) ────
  check:
    name: Check (${{ matrix.module }} / ${{ matrix.os }})
    needs: discover
    if: matrix.module != '__noop__'
    runs-on: ${{ matrix.os }}
    # Lift secret to job-level env so step-level `if:` can reference it via
    # `env.CODECOV_TOKEN`. The `secrets.*` context is not available in step
    # `if:` expressions, but `env.*` is.
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      # Single explicit `include:` matrix dimension. The discover job emits
      # one row per (module, os) pair, including cross-OS extras from
      # scripts/affected_modules.py:CROSS_OS_EXTRAS, filtered to modules
      # actually affected by the diff. This avoids the surprise that
      # GitHub's matrix.include adds rows on top of `matrix.module`/`os`.
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.check_includes) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Test (race + shuffle)
        if: matrix.os != 'windows-latest'
        working-directory: ${{ matrix.module }}
        run: go test -race -shuffle=on -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      # F-055 #62: Windows omits `-race` because the race detector requires
      # cgo + a working gcc toolchain, which is fragile on the GitHub-hosted
      # Windows runner and adds ~3min for marginal benefit (race is already
      # exercised on every Linux + macOS matrix entry). This is a deliberate
      # documented trade-off, not an oversight.
      - name: Test (no race on Windows)
        if: matrix.os == 'windows-latest'
        working-directory: ${{ matrix.module }}
        shell: bash
        run: go test -shuffle=on -count=1 ./...

      # F-054 #62: codecov upload is gated and now fails CI when it fails.
      # Fork PRs cannot read repo secrets, so `CODECOV_TOKEN` is empty there
      # — we skip the upload entirely to avoid spurious red builds. Internal
      # PRs and pushes to `main` enforce upload success.
      # NOTE: `secrets.*` is NOT available in step `if:`; we lift the token
      # to job-level `env:` (see top of this job) and check `env.*` here.
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module }}
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Stage 3c: Lint (per affected module, parallel) ────────────────────────
  lint:
    name: Lint (${{ matrix.module }})
    needs: discover
    if: matrix.module != '__noop__'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.0.0
        with:
          # Pinned to a specific version (was previously `latest`, which can
          # cause non-deterministic CI failures when a new linter release ships).
          # NOTE: golangci-lint-action v9 requires >= v2.1.0, and the linter
          # binary must be built with a Go version >= our toolchain (1.26.x),
          # so we pin to v2.11.4 (the current latest as of this commit).
          version: v2.11.4
          working-directory: ${{ matrix.module }}

  # ── Stage 3d: Security — gosec ─────────────────────────────────────────────
  # The standalone `securego/gosec` job was removed (F-005 #35). gosec is the
  # SAME analyzer in both invocations — golangci-lint embeds the upstream
  # gosec library — so security coverage is unchanged. What was consolidated
  # is the suppression-annotation format:
  #
  #   * standalone gosec honours only `// #nosec`
  #   * golangci-lint's gosec honours only `//nolint:gosec`
  #
  # The codebase uses the latter at intentional opt-in sites
  # (security/tls.go, discovery/consul/consul.go). Running both tools forced
  # either dual annotations everywhere or a global rule exclusion to silence
  # standalone gosec — the repo had picked the global exclusion, which
  # silently neutralised the per-site opt-in posture for G402
  # (InsecureSkipVerify), G404 (weak rand) and G306 (file perms) at sites
  # that were NOT meant to be excluded. That is the original F-005 finding.
  #
  # gosec now runs exclusively as part of `lint` (via golangci-lint). The
  # exclude list is mirrored in `.golangci.yml` (settings.gosec.excludes) and
  # `gosec.toml` (so a developer running gosec directly gets the same rules).

  # ── Stage 3e: Security — govulncheck per affected module ──────────────────
  vuln:
    name: Vuln (${{ matrix.module }})
    needs: discover
    if: matrix.module != '__noop__'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck (fail on any reachable vuln)
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  # ── Stage 3f: Fuzz smoke tests ─────────────────────────────────────────────
  fuzz:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      # 30s per target — surfaces obvious regressions; long campaigns run in
      # a separate scheduled workflow. Targets are discovered dynamically so
      # newly-added FuzzXxx are picked up without editing CI.
      - name: Discover and run fuzz targets
        run: |
          set -euo pipefail
          # Find every (module_dir, package_dir, FuzzName) triple in the repo.
          mapfile -t mods < <(find . -name go.mod -not -path '*/vendor/*' -not -path '*/.git/*' | sed 's|/go.mod$||' | sort)
          fail=0
          for mod in "${mods[@]}"; do
            mapfile -t files < <(grep -rlE '^func Fuzz[A-Za-z0-9_]+' "$mod" --include='*_test.go' 2>/dev/null || true)
            for f in "${files[@]}"; do
              # package path relative to module (./pkg) and fuzz target names
              pkgdir=$(dirname "${f#$mod/}")
              [ "$pkgdir" = "." ] || pkgdir="./$pkgdir"
              [ "$pkgdir" = "" ] && pkgdir="."
              targets=$(grep -hoE '^func (Fuzz[A-Za-z0-9_]+)' "$f" | awk '{print $2}' | sort -u)
              for t in $targets; do
                echo "::group::$mod $pkgdir $t"
                ( cd "$mod" && go test -run='^$' -fuzz="^${t}$" -fuzztime=30s "${pkgdir:-.}" ) || fail=1
                echo "::endgroup::"
              done
            done
          done
          exit $fail

  # ── Stage 3g: Integration suite (gated by //go:build integration) ─────────
  # Slow / dependency-heavy cross-package tests live under the `integration`
  # build tag (F-019 #49). They are NOT part of the default `check` job so
  # PR feedback stays fast; this dedicated job runs them on push / PR but
  # does not block merge via the aggregate gate (initially advisory).
  integration:
    name: Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: go test -race -count=1 -tags=integration ./...

  # ── Gate: Aggregate status for branch protection ──────────────────────────
  ci-status:
    name: CI Status
    if: always()
    needs: [discover, tidy, version-check, check, lint, vuln, fuzz, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          # `skipped` is acceptable: it means a matrix job had only the
          # __noop__ row (PR didn't touch any module's source). Only hard
          # failures and cancellations should block.
          results=("${{ needs.discover.result }}" \
                   "${{ needs.tidy.result }}" \
                   "${{ needs.version-check.result }}" \
                   "${{ needs.check.result }}" \
                   "${{ needs.lint.result }}" \
                   "${{ needs.vuln.result }}" \
                   "${{ needs.fuzz.result }}" \
                   "${{ needs.integration.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::CI failed — one or more jobs did not succeed."
              exit 1
            fi
          done
          echo "All CI checks passed ✓"
