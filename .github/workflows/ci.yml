name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# NOTE: GitHub Actions are pinned to semver tags. The dependabot configuration
# in .github/dependabot.yml is configured to update them weekly; once the first
# PR cycle lands these tags can be upgraded to commit SHAs by Dependabot's
# `pinDigests` (or via Renovate). The Go version consistency check below
# guarantees no module-level Go version drift, mitigating one of the two
# supply-chain dimensions called out in the review.

jobs:
  # ── Stage 1: Discover all Go modules dynamically ──────────────────────────
  discover:
    name: Discover Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - uses: actions/checkout@v6

      - name: Find all Go modules
        id: find
        run: |
          modules=$(find . -name 'go.mod' -not -path '*/vendor/*' -not -path '*/.git/*' \
            | sed 's|/go.mod||' | sed 's|^\./||' | sed 's|^$|.|' | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules=$modules" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: $modules"

  # ── Stage 2: Go version consistency across all modules ─────────────────────
  version-check:
    name: Go Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify uniform Go version across modules
        run: |
          versions=$(grep '^go ' $(find . -name go.mod -not -path '*/vendor/*' -not -path '*/.git/*') | awk '{print $NF}' | sort -u)
          count=$(printf '%s\n' "$versions" | grep -c .)
          if [ "$count" -ne 1 ]; then
            echo "::error::Multiple Go versions found across modules:"
            printf '%s\n' "$versions"
            exit 1
          fi
          echo "All modules use Go version: $versions"

  # ── Stage 3a: Tidy + CHANGELOG check ──────────────────────────────────────
  tidy:
    name: Tidy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate CHANGELOG unreleased heading
        run: ./scripts/check_changelog_unreleased.sh

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify modules are tidy
        run: |
          chmod +x ./gomod.sh
          ./gomod.sh tidy
          if [ -n "$(git status --porcelain -- '*.mod' '*.sum')" ]; then
            echo "::error::go.mod/go.sum are not tidy. Run 'make tidy' and commit the changes."
            git --no-pager diff -- '*.mod' '*.sum'
            exit 1
          fi

  # ── Stage 3b: Build + Vet + Test (per module × OS, parallel) ──────────────
  check:
    name: Check (${{ matrix.module }} / ${{ matrix.os }})
    needs: discover
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
        os: [ubuntu-latest]
        # Cross-platform runs are scoped to a representative module to keep
        # CI cost bounded. Modules that are platform-sensitive (filesystem,
        # process, server) can be added to `include`.
        include:
          - module: '.'
            os: macos-latest
          - module: '.'
            os: windows-latest
          - module: 'storage'
            os: macos-latest
          - module: 'server'
            os: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Test (race + shuffle)
        if: matrix.os != 'windows-latest'
        working-directory: ${{ matrix.module }}
        run: go test -race -shuffle=on -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Test (no race on Windows)
        if: matrix.os == 'windows-latest'
        working-directory: ${{ matrix.module }}
        shell: bash
        run: go test -shuffle=on -count=1 ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Stage 3c: Lint (per module, parallel) ─────────────────────────────────
  lint:
    name: Lint (${{ matrix.module }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pinned to a specific version (was previously `latest`, which can
          # cause non-deterministic CI failures when a new linter release ships).
          version: v2.0.0
          working-directory: ${{ matrix.module }}

  # ── Stage 3d: Security — gosec ─────────────────────────────────────────────
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -exclude-generated ./...

  # ── Stage 3e: Security — govulncheck per module ───────────────────────────
  vuln:
    name: Vuln (${{ matrix.module }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  # ── Stage 3f: Fuzz smoke tests ─────────────────────────────────────────────
  fuzz:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # 30 seconds per target — enough to surface obvious regressions; long
      # fuzzing campaigns are expected to run in a separate scheduled workflow.
      - name: Fuzz validation
        run: go test -run='^$' -fuzz='FuzzValidateUUID' -fuzztime=30s ./validation/

      - name: Fuzz server middleware (auth)
        working-directory: server
        run: go test -run='^$' -fuzz='FuzzExtractToken' -fuzztime=30s ./middleware/

      - name: Fuzz server httpx
        working-directory: server
        run: |
          # Discover any Fuzz* in httpx and run them serially.
          targets=$(grep -hoE '^func (Fuzz[A-Za-z0-9_]+)' ./httpx/fuzz_test.go | awk '{print $2}' | sort -u || true)
          for t in $targets; do
            echo "Running fuzz target $t"
            go test -run='^$' -fuzz="^${t}$" -fuzztime=30s ./httpx/
          done

      - name: Fuzz messaging
        working-directory: messaging
        run: |
          targets=$(grep -hoE '^func (Fuzz[A-Za-z0-9_]+)' ./fuzz_test.go | awk '{print $2}' | sort -u || true)
          for t in $targets; do
            echo "Running fuzz target $t"
            go test -run='^$' -fuzz="^${t}$" -fuzztime=30s ./
          done

  # ── Gate: Aggregate status for branch protection ──────────────────────────
  ci-status:
    name: CI Status
    if: always()
    needs: [tidy, version-check, check, lint, gosec, vuln, fuzz]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          results=("${{ needs.tidy.result }}" \
                   "${{ needs.version-check.result }}" \
                   "${{ needs.check.result }}" \
                   "${{ needs.lint.result }}" \
                   "${{ needs.gosec.result }}" \
                   "${{ needs.vuln.result }}" \
                   "${{ needs.fuzz.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::CI failed — one or more jobs did not succeed."
              exit 1
            fi
          done
          echo "All CI checks passed ✓"
