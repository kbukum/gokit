name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  merge_group:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# All third-party actions are pinned by 40-char SHA. Dependabot is configured
# (see .github/dependabot.yml) to bump both the SHA and the trailing version
# comment in lock-step. Do not relax to floating tags.

jobs:
  # ── Stage 0: Path filter (skip expensive jobs when Go code is unchanged) ──
  changes:
    name: Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go-code: ${{ steps.filter.outputs.go-code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            go-code:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - 'scripts/**'
              - 'Makefile'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'

  # ── Stage 1: Preflight (version consistency, tidy, changelog) ─────────────
  preflight:
    name: Preflight
    needs: changes
    if: needs.changes.outputs.go-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Verify uniform Go version across modules
        run: |
          versions=$(grep '^go ' $(find . -name go.mod -not -path '*/vendor/*' -not -path '*/.git/*') | awk '{print $NF}' | sort -u)
          count=$(printf '%s\n' "$versions" | grep -c .)
          if [ "$count" -ne 1 ]; then
            echo "::error::Multiple Go versions found across modules:"
            printf '%s\n' "$versions"
            exit 1
          fi
          echo "All modules use Go version: $versions"

      - name: Validate CHANGELOG unreleased heading
        run: ./scripts/check_changelog_unreleased.sh

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      - name: Verify modules are tidy
        run: |
          ./gomod.sh tidy
          if [ -n "$(git status --porcelain -- '*.mod' '*.sum')" ]; then
            echo "::error::go.mod/go.sum are not tidy. Run 'make tidy' and commit the changes."
            git --no-pager diff -- '*.mod' '*.sum'
            exit 1
          fi

  # ── Stage 2: Build + Vet + Test (single job for all modules on Linux) ────
  check:
    name: Check
    needs: changes
    if: needs.changes.outputs.go-code == 'true'
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      - name: Build, vet, and test all modules
        run: |
          set -euo pipefail
          modules=$(find . -name 'go.mod' -not -path '*/vendor/*' -not -path '*/.git/*' \
            | sed 's|/go.mod||' | sed 's|^\./||' | sed 's|^$|.|' | sort)
          failed=0
          for mod in $modules; do
            echo "::group::Check $mod"
            (cd "$mod" && go build ./... && go vet ./...) || { echo "::error::Build/vet failed: $mod"; failed=1; echo "::endgroup::"; continue; }
            if ! (cd "$mod" && go test -race -shuffle=on -count=1 -timeout=20m -covermode=atomic -coverprofile=coverage.out ./...); then
              echo "::error::Tests failed: $mod"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

      - name: Merge and upload coverage
        if: env.CODECOV_TOKEN != ''
        run: |
          set -euo pipefail
          modules=$(find . -name 'go.mod' -not -path '*/vendor/*' -not -path '*/.git/*' \
            | sed 's|/go.mod||' | sed 's|^\./||' | sed 's|^$|.|' | sort)
          covfiles=""
          for mod in $modules; do
            if [ -f "$mod/coverage.out" ]; then
              covfiles="$covfiles,$mod/coverage.out"
            fi
          done
          covfiles="${covfiles#,}"
          echo "Coverage files: $covfiles"
          echo "files=$covfiles" >> "$GITHUB_ENV"

      - name: Upload coverage
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: ${{ env.files }}
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Stage 2-cross: Cross-OS tests for platform-sensitive modules ──────────
  check-cross:
    name: Check (${{ matrix.module }} / ${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.go-code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: 'storage'
            os: macos-latest
          - module: 'server'
            os: macos-latest
          - module: 'workload'
            os: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -race -shuffle=on -count=1 -timeout=20m ./...

  # ── Stage 3: Lint ───────────────────────────────────────────────────────────
  # gosec runs exclusively as part of golangci-lint (see .golangci.yml).
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.go-code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4

      - name: Lint all modules
        run: |
          set -euo pipefail
          modules=$(find . -name 'go.mod' -not -path '*/vendor/*' -not -path '*/.git/*' \
            | sed 's|/go.mod||' | sed 's|^\./||' | sed 's|^$|.|' | sort)
          failed=0
          for mod in $modules; do
            echo "::group::Lint $mod"
            if ! (cd "$mod" && golangci-lint run ./...); then
              echo "::error::Lint failed for module: $mod"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  # ── Stage 3s: Security scan ──────────────────────────────────────────────────
  security:
    name: Security
    needs: changes
    if: needs.changes.outputs.go-code == 'true' && (github.event_name == 'merge_group' || github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck (all modules)
        run: |
          set -euo pipefail
          modules=$(find . -name 'go.mod' -not -path '*/vendor/*' -not -path '*/.git/*' \
            | sed 's|/go.mod||' | sed 's|^\./||' | sed 's|^$|.|' | sort)
          failed=0
          for mod in $modules; do
            echo "::group::Vuln $mod"
            if ! "$GITHUB_WORKSPACE/scripts/govulncheck.py" --module "$mod" -- ./...; then
              echo "::error::govulncheck failed for module: $mod"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  # ── Stage 3f: Fuzz smoke tests ─────────────────────────────────────────────
  fuzz:
    name: Fuzz Smoke
    needs: changes
    if: needs.changes.outputs.go-code == 'true' && (github.event_name == 'merge_group' || github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      # 30s per target — surfaces obvious regressions; long campaigns run in
      # a separate scheduled workflow. Targets are discovered dynamically so
      # newly-added FuzzXxx are picked up without editing CI.
      - name: Discover and run fuzz targets
        run: |
          set -euo pipefail
          # Find every (module_dir, package_dir, FuzzName) triple in the repo.
          mapfile -t mods < <(find . -name go.mod -not -path '*/vendor/*' -not -path '*/.git/*' | sed 's|/go.mod$||' | sort)
          fail=0
          for mod in "${mods[@]}"; do
            # Build prune args so grep does not recurse into nested modules
            # (otherwise fuzz targets in submodules get discovered twice:
            # once via their own module, once via the parent's recursive scan).
            prune_args=()
            for other in "${mods[@]}"; do
              [ "$other" = "$mod" ] && continue
              case "$other" in
                "$mod"/*) prune_args+=( --exclude-dir="$(basename "$other")" ) ;;
              esac
            done
            mapfile -t files < <(grep -rlE '^func Fuzz[A-Za-z0-9_]+' "$mod" --include='*_test.go' "${prune_args[@]}" 2>/dev/null || true)
            for f in "${files[@]}"; do
              # package path relative to module (./pkg) and fuzz target names
              pkgdir=$(dirname "${f#$mod/}")
              [ "$pkgdir" = "." ] || pkgdir="./$pkgdir"
              [ "$pkgdir" = "" ] && pkgdir="."
              targets=$(grep -hoE '^func (Fuzz[A-Za-z0-9_]+)' "$f" | awk '{print $2}' | sort -u)
              for t in $targets; do
                echo "::group::$mod $pkgdir $t"
                # Capture output so we can distinguish a real fuzz crash
                # ("Failing input written to") from the Go test harness's
                # known "context deadline exceeded" that fires when
                # -fuzztime elapses while workers are mid-shutdown — that
                # surfaces as exit-1 even though no failing seed exists.
                out=$( ( cd "$mod" && go test -run='^$' -fuzz="^${t}$" -fuzztime=30s "${pkgdir:-.}" ) 2>&1 ) && rc=0 || rc=$?
                echo "$out"
                if [ "$rc" -ne 0 ]; then
                  if echo "$out" | grep -q 'Failing input written to'; then
                    echo "::error::$mod $pkgdir $t found a failing input"
                    fail=1
                  elif echo "$out" | grep -qE 'context deadline exceeded$'; then
                    echo "::warning::$mod $pkgdir $t: harness deadline race, treating as pass"
                  else
                    echo "::error::$mod $pkgdir $t failed (rc=$rc)"
                    fail=1
                  fi
                fi
                echo "::endgroup::"
              done
            done
          done
          exit $fail

  # ── Stage 3g: Integration suite (gated by //go:build integration) ─────────
  # Slow / dependency-heavy cross-package tests live under the `integration`
  # build tag (F-019 #49). They are NOT part of the default `check` job so
  # PR feedback stays fast; this dedicated job runs on merge queue / push but
  # does not block merge via the aggregate gate (initially advisory).
  integration:
    name: Integration
    needs: changes
    if: needs.changes.outputs.go-code == 'true' && (github.event_name == 'merge_group' || github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: go test -race -count=1 -timeout=20m -tags=integration ./...

  # ── Gate: Aggregate status for branch protection ──────────────────────────
  ci-status:
    name: CI Status
    if: always()
    needs: [changes, preflight, check, check-cross, lint, security, fuzz, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          results=("${{ needs.changes.result }}" \
                   "${{ needs.preflight.result }}" \
                   "${{ needs.check.result }}" \
                   "${{ needs.check-cross.result }}" \
                   "${{ needs.lint.result }}" \
                   "${{ needs.security.result }}" \
                   "${{ needs.fuzz.result }}" \
                   "${{ needs.integration.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::CI failed — one or more jobs did not succeed."
              exit 1
            fi
          done
          echo "All CI checks passed ✓"
