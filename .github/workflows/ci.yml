name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# All third-party actions are pinned by 40-char SHA. Dependabot is configured
# (see .github/dependabot.yml) to bump both the SHA and the trailing version
# comment in lock-step. Do not relax to floating tags.

jobs:
  # ── Stage 1: Discover all Go modules dynamically ──────────────────────────
  discover:
    name: Discover Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Find all Go modules
        id: find
        run: |
          modules=$(find . -name 'go.mod' -not -path '*/vendor/*' -not -path '*/.git/*' \
            | sed 's|/go.mod||' | sed 's|^\./||' | sed 's|^$|.|' | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules=$modules" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: $modules"

  # ── Stage 2: Go version consistency across all modules ─────────────────────
  version-check:
    name: Go Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Verify uniform Go version across modules
        run: |
          versions=$(grep '^go ' $(find . -name go.mod -not -path '*/vendor/*' -not -path '*/.git/*') | awk '{print $NF}' | sort -u)
          count=$(printf '%s\n' "$versions" | grep -c .)
          if [ "$count" -ne 1 ]; then
            echo "::error::Multiple Go versions found across modules:"
            printf '%s\n' "$versions"
            exit 1
          fi
          echo "All modules use Go version: $versions"

  # ── Stage 3a: Tidy + CHANGELOG check ──────────────────────────────────────
  tidy:
    name: Tidy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Validate CHANGELOG unreleased heading
        run: ./scripts/check_changelog_unreleased.sh

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      - name: Verify modules are tidy
        run: |
          ./gomod.sh tidy
          if [ -n "$(git status --porcelain -- '*.mod' '*.sum')" ]; then
            echo "::error::go.mod/go.sum are not tidy. Run 'make tidy' and commit the changes."
            git --no-pager diff -- '*.mod' '*.sum'
            exit 1
          fi

  # ── Stage 3b: Build + Vet + Test (per module × OS, parallel) ──────────────
  check:
    name: Check (${{ matrix.module }} / ${{ matrix.os }})
    needs: discover
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
        os: [ubuntu-latest]
        # Cross-platform runs are scoped to a representative module to keep
        # CI cost bounded. Modules that are platform-sensitive (filesystem,
        # process, server) can be added to `include`.
        include:
          - module: '.'
            os: macos-latest
          - module: '.'
            os: windows-latest
          - module: 'storage'
            os: macos-latest
          - module: 'server'
            os: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Test (race + shuffle)
        if: matrix.os != 'windows-latest'
        working-directory: ${{ matrix.module }}
        run: go test -race -shuffle=on -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Test (no race on Windows)
        if: matrix.os == 'windows-latest'
        working-directory: ${{ matrix.module }}
        shell: bash
        run: go test -shuffle=on -count=1 ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Stage 3c: Lint (per module, parallel) ─────────────────────────────────
  lint:
    name: Lint (${{ matrix.module }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.0.0
        with:
          # Pinned to a specific version (was previously `latest`, which can
          # cause non-deterministic CI failures when a new linter release ships).
          version: v2.0.0
          working-directory: ${{ matrix.module }}

  # ── Stage 3d: Security — gosec ─────────────────────────────────────────────
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      - name: Run gosec
        uses: securego/gosec@223e19b8856e00f02cc67804499a83f77e208f3c  # v2.25.0
        with:
          args: -nosec -exclude=G115,G118,G204,G304,G306,G402,G404,G704 -exclude-generated ./...

  # ── Stage 3e: Security — govulncheck per module ───────────────────────────
  vuln:
    name: Vuln (${{ matrix.module }})
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck (fail on any reachable vuln)
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  # ── Stage 3f: Fuzz smoke tests ─────────────────────────────────────────────
  fuzz:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.0.0
        with:
          go-version-file: go.mod

      # 30s per target — surfaces obvious regressions; long campaigns run in
      # a separate scheduled workflow. Targets are discovered dynamically so
      # newly-added FuzzXxx are picked up without editing CI.
      - name: Discover and run fuzz targets
        run: |
          set -euo pipefail
          # Find every (module_dir, package_dir, FuzzName) triple in the repo.
          mapfile -t mods < <(find . -name go.mod -not -path '*/vendor/*' -not -path '*/.git/*' | sed 's|/go.mod$||' | sort)
          fail=0
          for mod in "${mods[@]}"; do
            mapfile -t files < <(grep -rlE '^func Fuzz[A-Za-z0-9_]+' "$mod" --include='*_test.go' 2>/dev/null || true)
            for f in "${files[@]}"; do
              # package path relative to module (./pkg) and fuzz target names
              pkgdir=$(dirname "${f#$mod/}")
              [ "$pkgdir" = "." ] || pkgdir="./$pkgdir"
              [ "$pkgdir" = "" ] && pkgdir="."
              targets=$(grep -hoE '^func (Fuzz[A-Za-z0-9_]+)' "$f" | awk '{print $2}' | sort -u)
              for t in $targets; do
                echo "::group::$mod $pkgdir $t"
                ( cd "$mod" && go test -run='^$' -fuzz="^${t}$" -fuzztime=30s "${pkgdir:-.}" ) || fail=1
                echo "::endgroup::"
              done
            done
          done
          exit $fail

  # ── Gate: Aggregate status for branch protection ──────────────────────────
  ci-status:
    name: CI Status
    if: always()
    needs: [tidy, version-check, check, lint, gosec, vuln, fuzz]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          results=("${{ needs.tidy.result }}" \
                   "${{ needs.version-check.result }}" \
                   "${{ needs.check.result }}" \
                   "${{ needs.lint.result }}" \
                   "${{ needs.gosec.result }}" \
                   "${{ needs.vuln.result }}" \
                   "${{ needs.fuzz.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::CI failed — one or more jobs did not succeed."
              exit 1
            fi
          done
          echo "All CI checks passed ✓"
