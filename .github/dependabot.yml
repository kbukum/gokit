version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        patterns:
          - "*"

  # ── Go modules — all modules auto-discovered via globs ──────────────────────
  # Dependabot does NOT read go.work; directories must be listed explicitly.
  # The wildcard globs below auto-discover modules at 1-level and 2-level depth
  # so new modules are picked up without editing this file.
  - package-ecosystem: "gomod"
    directories:
      - "/"           # root module
      - "/*"          # 1-level sub-modules (auth, server, storage, …)
      - "/*/*"        # 2-level sub-modules (bench/storage, llm/providers, */testutil, …)
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "go"
    open-pull-requests-limit: 15
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 7
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
      otel:
        patterns:
          - "go.opentelemetry.io/*"
      grpc:
        patterns:
          - "google.golang.org/grpc"
          - "google.golang.org/grpc/*"
          - "google.golang.org/genproto/*"
          - "google.golang.org/protobuf"
      aws:
        patterns:
          - "github.com/aws/*"
      k8s:
        patterns:
          - "k8s.io/*"
      # Security updates always ship in their own PR (fast lane).
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
