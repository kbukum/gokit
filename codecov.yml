coverage:
  # A coverage drop fails CI: `auto` compares against the base commit and the
  # threshold bounds how far the whole project may slip before the status is red.
  # The ≥80%-per-package floor is tracked as an advisory component status below
  # while the remaining modules are backfilled (see tmp/release-parity-plan/FOLLOWUPS.md);
  # security-load-bearing modules are already enforced at ≥85%.
  status:
    project:
      default:
        target: auto
        threshold: 1%
    # New and changed lines must stay well covered so coverage cannot regress via
    # untested edits, independent of legacy per-package debt.
    patch:
      default:
        target: 85%
        threshold: 0%

# Per-module coverage gates. Security-load-bearing modules are enforced at ≥85%
# (blocking). Every other module carries an advisory ≥80% floor that reports but
# does not block while the backfill in FOLLOWUPS.md lands.
component_management:
  default_rules:
    statuses:
      - type: project
        target: 80%
        threshold: 1%
        informational: true
  individual_components:
    - component_id: errors
      name: errors
      paths: [errors/**]
      statuses:
        - type: project
          target: 85%
          threshold: 0%
    - component_id: auth
      name: auth
      paths: [auth/**]
      statuses:
        - type: project
          target: 85%
          threshold: 0%
    - component_id: authz
      name: authz
      paths: [authz/**]
      statuses:
        - type: project
          target: 85%
          threshold: 0%
    - component_id: security
      name: security
      paths: [security/**]
      statuses:
        - type: project
          target: 85%
          threshold: 0%
    - component_id: resilience
      name: resilience
      paths: [resilience/**]
      statuses:
        - type: project
          target: 85%
          threshold: 0%
    - component_id: encryption
      name: encryption
      paths: [encryption/**]
      statuses:
        - type: project
          target: 85%
          threshold: 0%

comment:
  layout: "reach,diff,flags,components,files"
  behavior: default
  require_changes: true
