# Source-only library release: archive, complete source SBOM, checksum, and signature bundle.
version: 2

project_name: gokit

builds:
  - skip: true   # gokit ships libraries, not binaries.

source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Version }}-source"
  format: tar.gz

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: source
    documents:
      - "{{ .ProjectName }}-{{ .Version }}.cdx.json"
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document", "--enrich", "all"]

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

release:
  github:
    owner: kbukum
    name: gokit
  prerelease: auto
  draft: false
  name_template: "{{ .Tag }}"
