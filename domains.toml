# Maps modules to domains. Used by: Makefile, CI, generated docs.
# Module names use the kit's canonical naming (directory/crate/package name without kit prefix).

[domains.core]
description = "Foundation types, config, logging, validation, encryption, codec, filesystem utilities"
modules = ["errors", "config", "logging", "validation", "encryption", "util", "fs", "version", "schema", "codec"]

[domains.patterns]
description = "Component lifecycle, provider shapes, DI, hooks"
modules = ["component", "hook", "provider", "di"]
depends_on = ["core"]

[domains.crosscutting]
description = "Observability, resilience, security"
modules = ["observability", "resilience", "security"]
depends_on = ["core", "patterns"]

[domains.composition]
description = "Bootstrap, stream, DAG, chain, worker, process, stateful"
modules = ["bootstrap", "stream", "dag", "dag/testutil", "chain", "worker", "process", "stateful"]
depends_on = ["core", "patterns", "crosscutting"]

[domains.devtools]
description = "Developer tooling: git"
modules = ["git", "git/testutil"]
depends_on = ["core"]

[domains.transport]
description = "Server, HTTP client, gRPC, SSE, connect, discovery"
modules = ["server", "server/testutil", "httpclient", "grpc", "sse", "connect", "connect/testutil", "discovery", "discovery/testutil"]
depends_on = ["core", "patterns", "crosscutting"]

[domains.auth]
description = "Authentication and authorization"
modules = ["auth", "authz"]
depends_on = ["core", "patterns", "crosscutting", "transport"]

[domains.data]
description = "Database, cache, storage, vectorstore, messaging"
modules = ["database", "database/sqlite", "database/testutil", "cache", "cache/redis", "storage", "storage/s3", "storage/gcs", "storage/testutil", "vectorstore", "vectorstore/qdrant", "messaging", "messaging/kafka", "messaging/nats", "messaging/rabbitmq"]
depends_on = ["core", "patterns", "crosscutting", "transport", "auth"]

[domains.ai]
description = "LLM, inference, embedding, agent, tool, MCP, skill"
modules = ["ai", "llm", "llm/providers", "embedding", "inference", "inference/tgi", "inference/triton", "inference/vllm", "agent", "tool", "mcp", "skill"]
depends_on = ["core", "patterns", "crosscutting", "transport", "auth"]

[domains.media]
description = "Light detection, metadata, image ops, time/spatial, subtitles"
modules = ["media"]
depends_on = ["core", "patterns", "crosscutting"]

[domains.infra]
description = "Workload management, CLI, benchmarking, dataset, test utilities, integration"
modules = ["workload", "workload/testutil", "bench", "bench/storage", "testutil"]
depends_on = ["core", "patterns"]
